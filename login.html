<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — MPSTME Library</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

  <nav class="navbar">
    <div class="nav-brand">&#9676; MPSTME Library</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link active">Login</a>
      <a href="signup.html" class="nav-link btn-nav">Sign Up</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">&#128218;</div>
        <h2>Welcome Back</h2>
        <p>Login to access the MPSTME Library</p>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>
      <div id="successMsg" class="success-msg" style="display:none;"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Your college email"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>

      <button class="btn-primary full-width" onclick="loginUser()">Login</button>
      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>

      <div class="demo-hint">
        <strong>Admin:</strong> admin@mpstme.ac.in / admin123
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
